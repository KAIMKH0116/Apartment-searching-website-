name: 🐛 Bug報告
description: スクリプトやツールの不具合を報告する
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: project
    attributes:
      label: 対象プロジェクト
      options:
        - 不動産監視システム
        - SEOランクチェッカー
        - KPI管理
        - その他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 不具合の内容
      description: 何が起きているか具体的に
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待していた動作
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作（エラーメッセージ等あれば貼付）
  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
