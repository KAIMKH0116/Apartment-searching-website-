name: 不動産リサーチ 自動クローラー

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: クローラー実行
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/crawler.py

      - name: スナップショットをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.json data/results.json
          git diff --staged --quiet || git commit -m "chore: スナップショット更新 $(date '+%Y-%m-%d')"
          git push
